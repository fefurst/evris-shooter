name: Godot Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"

jobs:
  export:
    name: Export Multiplatform
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Export Godot Project
        id: export
        uses: firebelley/godot-export@master
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: evris-shooter-linux
          path: ${{ steps.export.outputs.archive_directory }}/Linux.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: evris-shooter-windows
          path: ${{ steps.export.outputs.archive_directory }}/Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.export.outputs.archive_directory }}/*.zip
          generate_release_notes: true
